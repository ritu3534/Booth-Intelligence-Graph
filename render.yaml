services:
  # --- BACKEND SERVICE ---
  - type: web
    name: jansetu-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 7000
      - key: MEMGRAPH_HOST
        fromService:
          type: web
          name: jansetu-memgraph
          property: host
      - key: MEMGRAPH_PORT
        value: 7687
      - key: GEMINI_API_KEY
        sync: false

  # --- FRONTEND SERVICE ---
  - type: web
    name: jansetu-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.frontend
    plan: free

  # --- MEMGRAPH DATABASE ---
  - type: web # Changed from privateService/pvt to web for blueprint compatibility
    name: jansetu-memgraph
    env: docker
    dockerContext: .
    image: memgraph/memgraph-mage:latest
    plan: free
    # We define the port but Render will keep it internal if we don't use it as a web server
    ports:
      - port: 7687
        protocol: TCP