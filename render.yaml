services:
  # --- BACKEND ---
  - type: web
    name: jansetu-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 7000
      - key: MEMGRAPH_HOST
        value: jansetu-memgraph # Matches the name you gave in Step 1
      - key: MEMGRAPH_PORT
        value: 7687
      - key: GEMINI_API_KEY
        sync: false

  # --- FRONTEND ---
  - type: web
    name: jansetu-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.frontend
    plan: free