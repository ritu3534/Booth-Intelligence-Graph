services:
  # --- BACKEND SERVICE ---
  - type: web
    name: jansetu-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 7000
      - key: MEMGRAPH_HOST
        fromService:
          type: privateService
          name: jansetu-memgraph
          property: host
      - key: MEMGRAPH_PORT
        value: 7687
      - key: GEMINI_API_KEY
        sync: false # You will set this manually in the Render Dashboard

  # --- FRONTEND SERVICE ---
  - type: web
    name: jansetu-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.frontend
    plan: free

  # --- MEMGRAPH (Private Service) ---
  - type: privateService
    name: jansetu-memgraph
    env: docker
    dockerContext: .
    # Using the official image directly in the blueprint
    image: memgraph/memgraph-mage:latest
    plan: free
    ports:
      - port: 7687
        protocol: TCP